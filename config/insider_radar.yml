signals:
  # Rolling window (days) for cluster detection
  cluster_window_days: 30
  # Minimum distinct insiders buying (code P) within window for a cluster buy
  cluster_min_insiders: 3
  # Open-market purchase above this is a "notable buy" (USD)
  notable_buy_usd: 250000
  # CEO/CFO non-10b5-1 purchase above this is STRONG BULLISH (USD)
  officer_strong_buy_usd: 500000
  # CEO/CFO non-10b5-1 sell above this is CAUTION (USD)
  officer_caution_sell_usd: 1000000
  # Sells below this are NEUTRAL (USD)
  routine_sell_usd: 1000000
  # Stake increase above this fraction is BULLISH
  stake_increase_bullish: 0.20
  # Stake reduction above this fraction is CAUTION
  stake_reduction_caution: 0.50
  # Offering/conversion detection: this many distinct insiders filing code P
  # at the IDENTICAL price on the same date at one issuer marks a subscription
  # or mutual-to-stock conversion offering — a fixed-price insider allocation,
  # never an open-market conviction buy. Flagged OFFERING PARTICIPATION and
  # excluded from bullish and cluster-buy scoring.
  offering_min_insiders: 3
  # Condition 2 (new-issue window): for a clustered issuer (>= offering_min_insiders
  # code-P buyers on one date) whose price varies slightly, also treat it as an
  # offering if the issuer is a recent listing — the trade falls within its first
  # `new_issue_trading_days` trading days of price history (checked via yfinance,
  # scoped to clustered issuers only so lookups stay cheap). Set false to disable.
  check_new_issue: true
  new_issue_trading_days: 10

performance:
  # A recorded bullish signal is graded against SPY only after it has had this
  # many days to play out. Prevents day-one noise from dominating the scorecard.
  min_grade_age_days: 21

scraper:
  # Coverage mode:
  #   watchlist - only the tickers listed above (fast, focused, no discovery)
  #   firehose  - EVERY Form 4 filed market-wide, read from EDGAR daily
  #               indexes (Kestrel-style; surfaces insider activity in names
  #               you are not already watching). Ignores the watchlist.
  mode: firehose
  # SEC fair-access policy: max 10 requests/second, identified User-Agent
  max_requests_per_second: 10
  user_agent: "MarketScanner InsiderRadar devrim.birlik@revunited.ca"
  # Days to backfill on first run in watchlist mode
  backfill_days: 30
  # Days to backfill on first run in firehose mode. Kept small because a
  # single market-wide day is thousands of filings; history accumulates as
  # scheduled runs append each new trading day.
  firehose_backfill_days: 3
  # In firehose mode, only store filings that contain an open-market
  # purchase (P) or sale (S). Drops routine awards/exercises/gifts/tax
  # withholding, which carry no directional signal and would bloat the DB.
  firehose_signal_only: true
  # Retry with exponential backoff on 429/503
  max_retries: 5
  backoff_base_seconds: 2
  # Firehose accumulates market-wide filings every run; prune anything older
  # than this many days so the committed SQLite database stays bounded.
  retention_days: 120
