name: Congress Trades Tracker

on:
  schedule:
    # Scrape twice a day on weekdays (House PTRs post through the business day)
    - cron: '0 16 * * 1-5'   # 9am Pacific
    - cron: '0 23 * * 1-5'   # 4pm Pacific
    # Email digest at 6:20am Pacific
    - cron: '20 13 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        type: choice
        options: [scrape, email, both]
        default: both

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule != '20 13 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && inputs.job != 'email')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run congress tracker scrape
        run: python scripts/congress_tracker.py
      - name: Commit data and dashboard
        run: |
          git config user.name "congress-tracker-bot"
          git config user.email "actions@github.com"
          git add data/congress_trades.db data/congress_runlog.json data/congress_roster \
                  docs/congress_tracker.html docs/congress_email.html docs/congress_email_subject.txt
          git diff --cached --quiet || git commit -m "Congress tracker scrape $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push origin main
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

  email:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '20 13 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && inputs.job != 'scrape')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check email content exists
        id: check
        run: |
          if [ -f docs/congress_email.html ] && [ -f docs/congress_email_subject.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "subject=$(cat docs/congress_email_subject.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No email content yet — has a scrape run?"
          fi
      - name: Send Congress Trades email
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.check.outputs.subject }}
          to: gtmautomation.ops@gmail.com
          from: Congress Trades Tracker <${{ secrets.GMAIL_USERNAME }}>
          html_body: file://docs/congress_email.html
